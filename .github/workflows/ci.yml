name: "CI"

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  COMPONENT: custom_components/yarbo_bg

jobs:
  lint-and-test:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - name: "Check out repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "Set up Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: "Shallow clone Home Assistant core"
        run: git clone --depth 1 --branch 2026.5.4 https://github.com/home-assistant/core.git /tmp/ha-core

      - name: "Install dependencies"
        run: |
          pip install --no-deps /tmp/ha-core
          pip install voluptuous
          pip install -r requirements_dev.txt

      - name: "Run ruff lint"
        run: ruff check ${{ env.COMPONENT }}/

      - name: "Run ruff format check"
        run: ruff format --check ${{ env.COMPONENT }}/

      - name: "Run pyright"
        run: pyright ${{ env.COMPONENT }}/

      - name: "Run tests with coverage"
        run: pytest --cov=${{ env.COMPONENT }} --cov-report=term-missing

      - name: "Run bandit security scan"
        run: bandit -c pyproject.toml -r ${{ env.COMPONENT }}/

      - name: "Compile check"
        run: python -m compileall ${{ env.COMPONENT }}/ -q
