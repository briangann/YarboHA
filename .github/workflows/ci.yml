name: "CI"

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when new commits push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPONENT: custom_components/yarbo_bg
  HA_BRANCH: "0723d8d83ff121e732e76b5dffe1b6648c69d596" # 2026.5.4
  HA_CLONE: /tmp/ha-core

jobs:
  lint-and-test:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - name: "Check out repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "Set up Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_dev.txt

      - name: "Cache Home Assistant core clone"
        id: cache-ha-core
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ env.HA_CLONE }}
          key: ha-core-${{ env.HA_BRANCH }}

      - name: "Shallow clone Home Assistant core"
        if: steps.cache-ha-core.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.HA_BRANCH }} https://github.com/home-assistant/core.git ${{ env.HA_CLONE }}

      - name: "Install dependencies"
        run: |
          pip install --no-deps ${{ env.HA_CLONE }}
          pip install voluptuous
          pip install -r requirements_dev.txt

      - name: "Run ruff lint"
        run: ruff check ${{ env.COMPONENT }}/

      - name: "Run ruff format check"
        run: ruff format --check ${{ env.COMPONENT }}/

      - name: "Run pyright"
        run: pyright ${{ env.COMPONENT }}/

      - name: "Run tests with coverage"
        run: pytest --tb=short --cov=${{ env.COMPONENT }} --cov-report=term-missing

      - name: "Run bandit security scan"
        run: bandit -c pyproject.toml -r ${{ env.COMPONENT }}/

      - name: "Compile check"
        run: python -m compileall ${{ env.COMPONENT }}/ -q
